<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Claude Toulouse"/>
<title>Claude — Toulouse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0b09;color:#ede5d4;font-family:'DM Sans',sans-serif;height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2a2218;border-radius:10px}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 #c0392b44}50%{box-shadow:0 0 0 8px #c0392b00}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PASSWORD = "toulouse31";

const SYSTEM_PROMPT = `Tu es l'assistant personnel et permanent de Jacques, un homme de Toulouse avec un fort accent du Sud-Ouest.

PROFIL UTILISATEUR :
- Prénom : Jacques
- Accent toulousain marqué — quand il dicte à la voix, les mots sont parfois mal retranscrits. Tu corriges automatiquement et tu réponds au sens voulu sans jamais le signaler.
- Tu lui parles toujours de façon chaleureuse, directe, avec la familiarité du Sud. Tu peux utiliser "bé", "bé oui", "oh bé" naturellement.
- Tu es son assistant personnel — tu connais tous ses projets, ses rappels, ses notes.

RÔLES :
1. Répondre à toutes ses questions à n'importe quelle heure
2. Gérer sa mémoire : retenir projets, idées, décisions
3. Gérer ses rappels et tâches
4. Surveiller l'avancement de ses projets
5. Sécuriser et organiser ses données personnelles
6. L'aider à créer des logiciels et applications

RÈGLES :
- Toujours corriger silencieusement les erreurs de dictée vocale
- Ne jamais mentionner d'autres utilisateurs ou partager des infos
- Répondre en français, registre chaleureux et direct
- Si on te demande qui tu es : "Je suis le double de Claude, l'assistant personnel de Jacques, toujours disponible."
- Sois concis sur mobile mais complet quand nécessaire`;

function App() {
  const [authed, setAuthed] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeTab, setActiveTab] = useState("chat");
  const [projects, setProjects] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [memory, setMemory] = useState([]);
  const [newProject, setNewProject] = useState("");
  const [newReminder, setNewReminder] = useState({ text: "", time: "" });
  const [newMemory, setNewMemory] = useState("");
  const [recording, setRecording] = useState(false);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    try {
      const p = localStorage.getItem("tls-projects");
      const r = localStorage.getItem("tls-reminders");
      const m = localStorage.getItem("tls-memory");
      const h = localStorage.getItem("tls-history");
      if (p) setProjects(JSON.parse(p));
      if (r) setReminders(JSON.parse(r));
      if (m) setMemory(JSON.parse(m));
      if (h) setMessages(JSON.parse(h).slice(-30));
    } catch {}
  }, []);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  const save = (key, data) => {
    try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
  };

  const buildContext = (mem, proj) => {
    let ctx = SYSTEM_PROMPT;
    if (mem.length) ctx += `\n\nMÉMOIRE PERSONNELLE :\n${mem.map((m,i) => `${i+1}. ${m}`).join("\n")}`;
    if (proj.length) ctx += `\n\nPROJETS ACTIFS :\n${proj.map((p,i) => `${i+1}. [${p.status}] ${p.name}`).join("\n")}`;
    return ctx;
  };

  const sendMessage = async (text) => {
    if (!text.trim() || loading) return;
    const userMsg = { role: "user", content: text };
    const updated = [...messages, userMsg];
    setMessages(updated);
    setInput("");
    setLoading(true);
    try {
      const history = updated.slice(-20).map(m => ({ role: m.role, content: m.content }));
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: buildContext(memory, projects),
          messages: history,
        }),
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text || "").join("") || "Désolé, erreur de connexion bé !";
      const final = [...updated, { role: "assistant", content: reply }];
      setMessages(final);
      save("tls-history", final.slice(-50));
    } catch {
      setMessages(prev => [...prev, { role: "assistant", content: "Erreur de connexion bé, réessaie !" }]);
    }
    setLoading(false);
  };

  const startVoice = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Reconnaissance vocale non supportée sur ce navigateur."); return; }
    const r = new SR();
    r.lang = "fr-FR";
    r.onstart = () => setRecording(true);
    r.onend = () => setRecording(false);
    r.onresult = (e) => { setInput(e.results[0][0].transcript); inputRef.current?.focus(); };
    r.onerror = () => setRecording(false);
    r.start();
  };

  const addProject = () => {
    if (!newProject.trim()) return;
    const p = [...projects, { name: newProject, status: "En cours", date: new Date().toLocaleDateString("fr-FR") }];
    setProjects(p); save("tls-projects", p); setNewProject("");
  };

  const toggleProject = (i) => {
    const p = projects.map((pr, idx) => idx === i ? { ...pr, status: pr.status.startsWith("✅") ? "En cours" : "✅ Terminé" } : pr);
    setProjects(p); save("tls-projects", p);
  };

  const deleteProject = (i) => { const p = projects.filter((_,idx) => idx !== i); setProjects(p); save("tls-projects", p); };

  const addReminder = () => {
    if (!newReminder.text.trim()) return;
    const r = [...reminders, { ...newReminder, done: false }];
    setReminders(r); save("tls-reminders", r); setNewReminder({ text: "", time: "" });
  };

  const toggleReminder = (i) => {
    const r = reminders.map((rm, idx) => idx === i ? { ...rm, done: !rm.done } : rm);
    setReminders(r); save("tls-reminders", r);
  };

  const deleteReminder = (i) => { const r = reminders.filter((_,idx) => idx !== i); setReminders(r); save("tls-reminders", r); };

  const addMemory = () => {
    if (!newMemory.trim()) return;
    const m = [...memory, newMemory];
    setMemory(m); save("tls-memory", m); setNewMemory("");
  };

  const deleteMemory = (i) => { const m = memory.filter((_,idx) => idx !== i); setMemory(m); save("tls-memory", m); };

  const cs = (base, extra = {}) => ({ ...base, ...extra });

  const S = {
    app: { height:"100dvh", display:"flex", flexDirection:"column", background:"#0c0b09", color:"#ede5d4", overflow:"hidden" },
    loginWrap: { height:"100dvh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"radial-gradient(ellipse at 60% 40%, #1a0a0a 0%, #0c0b09 70%)", padding:"24px" },
    loginCard: { background:"#161310", border:"1px solid #2a2218", borderRadius:"24px", padding:"40px 32px", width:"100%", maxWidth:"360px", textAlign:"center" },
    loginLogo: { width:"64px", height:"64px", background:"linear-gradient(135deg,#c0392b,#d4a017)", borderRadius:"18px", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 20px", fontSize:"28px", fontWeight:"700", color:"white" },
    header: { background:"#141210", borderBottom:"1px solid #1e1a15", padding:"12px 16px", display:"flex", alignItems:"center", gap:"12px", flexShrink:0 },
    headerLogo: { width:"36px", height:"36px", background:"linear-gradient(135deg,#c0392b,#d4a017)", borderRadius:"10px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"16px", fontWeight:"700", color:"white" },
    dot: { width:"7px", height:"7px", background:"#2ecc71", borderRadius:"50%", marginLeft:"auto", boxShadow:"0 0 8px #2ecc71aa", animation:"pulse 2s infinite" },
    tabs: { display:"flex", background:"#141210", borderBottom:"1px solid #1e1a15", flexShrink:0 },
    chatArea: { flex:1, overflowY:"auto", padding:"16px", display:"flex", flexDirection:"column", gap:"12px" },
    msgUser: { background:"linear-gradient(135deg,#c0392b22,#c0392b44)", border:"1px solid #c0392b55", borderRadius:"16px 16px 4px 16px", padding:"10px 14px", alignSelf:"flex-end", maxWidth:"82%", fontSize:"14px", lineHeight:"1.6", animation:"fadeUp .25s ease" },
    msgBot: { background:"#1a1714", border:"1px solid #2a2218", borderRadius:"16px 16px 16px 4px", padding:"10px 14px", alignSelf:"flex-start", maxWidth:"88%", fontSize:"14px", lineHeight:"1.6", animation:"fadeUp .25s ease" },
    inputZone: { background:"#141210", borderTop:"1px solid #1e1a15", padding:"10px 12px", display:"flex", alignItems:"flex-end", gap:"8px", flexShrink:0 },
    panel: { flex:1, overflowY:"auto", padding:"16px", display:"flex", flexDirection:"column", gap:"12px" },
    card: { background:"#1a1714", border:"1px solid #2a2218", borderRadius:"14px", padding:"14px" },
    addRow: { display:"flex", gap:"8px", marginBottom:"12px" },
    addInput: { flex:1, background:"#1e1a15", border:"1px solid #2a2218", borderRadius:"10px", padding:"10px 12px", color:"#ede5d4", fontSize:"13px", outline:"none", fontFamily:"'DM Sans',sans-serif" },
  };

  const tabStyle = (active) => ({ flex:1, padding:"10px 4px", border:"none", background:"none", color:active?"#d4a017":"#7a6f5e", fontSize:"11px", fontWeight:active?"600":"400", cursor:"pointer", borderBottom:active?"2px solid #d4a017":"2px solid transparent" });
  const itemStyle = { display:"flex", alignItems:"center", gap:"10px", padding:"10px 0", borderBottom:"1px solid #1e1a15" };

  if (!authed) return (
    <div style={S.loginWrap}>
      <div style={S.loginCard}>
        <div style={S.loginLogo}>C</div>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:"22px", marginBottom:"4px" }}>Claude — Toulouse</div>
        <div style={{ fontSize:"12px", color:"#7a6f5e", marginBottom:"28px" }}>Assistant personnel sécurisé</div>
        <input
          style={{ width:"100%", background:"#1e1a15", border:`1px solid ${pwError?"#e74c3c":"#2a2218"}`, borderRadius:"12px", padding:"14px 16px", color:"#ede5d4", fontSize:"16px", outline:"none", marginBottom:"12px", textAlign:"center", letterSpacing:"0.15em", fontFamily:"'DM Sans',sans-serif" }}
          type="password" placeholder="Mot de passe" value={pwInput}
          onChange={e => { setPwInput(e.target.value); setPwError(false); }}
          onKeyDown={e => e.key === "Enter" && (pwInput === PASSWORD ? (setAuthed(true)) : setPwError(true))}
          autoFocus
        />
        <button
          style={{ width:"100%", background:"linear-gradient(135deg,#c0392b,#a93226)", border:"none", borderRadius:"12px", padding:"14px", color:"white", fontSize:"15px", fontWeight:"600", cursor:"pointer" }}
          onClick={() => pwInput === PASSWORD ? setAuthed(true) : (setPwError(true), setPwInput(""))}
        >Entrer</button>
        {pwError && <div style={{ color:"#e74c3c", fontSize:"12px", marginTop:"8px" }}>Mot de passe incorrect bé !</div>}
      </div>
    </div>
  );

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={S.headerLogo}>C</div>
        <div>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:"15px" }}>Claude — Toulouse</div>
          <div style={{ fontSize:"10px", color:"#7a6f5e" }}>Toujours disponible · Accès privé</div>
        </div>
        <div style={S.dot}/>
      </div>

      <div style={S.tabs}>
        {[["chat","💬 Chat"],["projects","📋 Projets"],["reminders","⏰ Rappels"],["memory","🧠 Mémoire"]].map(([k,l]) => (
          <button key={k} style={tabStyle(activeTab===k)} onClick={() => setActiveTab(k)}>{l}</button>
        ))}
      </div>

      {activeTab === "chat" && <>
        <div style={S.chatArea}>
          {messages.length === 0 && (
            <div style={{ textAlign:"center", padding:"30px 16px", color:"#7a6f5e" }}>
              <div style={{ fontSize:"36px", marginBottom:"12px" }}>🌹</div>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:"24px", color:"#ede5d4", marginBottom:"6px" }}>Bonjour bé Jacques !</div>
              <div style={{ fontSize:"13px", lineHeight:"1.7" }}>Ton assistant personnel, sécurisé et toujours disponible.<br/>Parle ou écris, je suis là !</div>
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} style={m.role === "user" ? S.msgUser : S.msgBot}>
              {m.role === "assistant" && <div style={{ fontSize:"9px", color:"#d4a017", fontWeight:"600", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:"5px" }}>Claude · Toulouse</div>}
              <div style={{ whiteSpace:"pre-wrap" }}>{m.content}</div>
            </div>
          ))}
          {loading && (
            <div style={{ display:"flex", gap:"5px", alignItems:"center", padding:"12px 16px", background:"#1a1714", border:"1px solid #2a2218", borderRadius:"16px", alignSelf:"flex-start", width:"64px" }}>
              {[0,1,2].map(i => <div key={i} style={{ width:"7px", height:"7px", background:"#d4a017", borderRadius:"50%", animation:`bounce 1.2s ${i*0.15}s infinite` }}/>)}
            </div>
          )}
          <div ref={messagesEndRef}/>
        </div>
        <div style={S.inputZone}>
          <button
            style={{ width:"42px", height:"42px", borderRadius:"11px", border:recording?"1px solid #c0392b":"1px solid #2a2218", background:recording?"#c0392b22":"#1e1a15", color:recording?"#c0392b":"#7a6f5e", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", animation:recording?"micPulse 1s infinite":"none" }}
            onClick={startVoice}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm7 9a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V22h2v-2.06A9 9 0 0 0 21 11h-2z"/></svg>
          </button>
          <textarea
            ref={inputRef}
            style={{ flex:1, background:"#1e1a15", border:"1px solid #2a2218", borderRadius:"12px", padding:"10px 14px", color:"#ede5d4", fontSize:"14px", resize:"none", maxHeight:"100px", minHeight:"42px", lineHeight:"1.5", outline:"none", fontFamily:"'DM Sans',sans-serif" }}
            placeholder="Écris ou parle..." value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input); }}}
            rows={1}
          />
          <button
            style={{ width:"42px", height:"42px", borderRadius:"11px", border:"none", background:"linear-gradient(135deg,#c0392b,#a93226)", color:"white", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", opacity:loading||!input.trim()?0.4:1 }}
            onClick={() => sendMessage(input)} disabled={loading || !input.trim()}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
          </button>
        </div>
      </>}

      {activeTab === "projects" && (
        <div style={S.panel}>
          <div style={{ fontSize:"11px", fontWeight:"600", color:"#d4a017", textTransform:"uppercase", letterSpacing:"0.1em" }}>Projets en cours</div>
          <div style={S.addRow}>
            <input style={S.addInput} placeholder="Nouveau projet..." value={newProject} onChange={e => setNewProject(e.target.value)} onKeyDown={e => e.key==="Enter" && addProject()}/>
            <button style={{ background:"linear-gradient(135deg,#c0392b,#a93226)", border:"none", borderRadius:"10px", padding:"10px 16px", color:"white", fontWeight:"600", cursor:"pointer", fontSize:"18px" }} onClick={addProject}>+</button>
          </div>
          <div style={S.card}>
            {projects.length === 0 && <div style={{ color:"#5a5040", fontSize:"13px", textAlign:"center", padding:"20px 0" }}>Aucun projet pour l'instant bé !</div>}
            {projects.map((p, i) => (
              <div key={i} style={itemStyle}>
                <button style={{ width:"22px", height:"22px", borderRadius:"6px", border:"1px solid #2a2218", background:"none", cursor:"pointer", color:"#2ecc71", fontSize:"12px" }} onClick={() => toggleProject(i)}>{p.status.startsWith("✅")?"✅":"○"}</button>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"13px", color:p.status.startsWith("✅")?"#5a5040":"#ede5d4", textDecoration:p.status.startsWith("✅")?"line-through":"none" }}>{p.name}</div>
                  <div style={{ fontSize:"10px", color:"#5a5040" }}>{p.status} · {p.date}</div>
                </div>
                <button style={{ background:"none", border:"none", color:"#5a5040", cursor:"pointer", fontSize:"16px" }} onClick={() => deleteProject(i)}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {activeTab === "reminders" && (
        <div style={S.panel}>
          <div style={{ fontSize:"11px", fontWeight:"600", color:"#d4a017", textTransform:"uppercase", letterSpacing:"0.1em" }}>Rappels & tâches</div>
          <div style={S.addRow}>
            <input style={{ ...S.addInput, flex:2 }} placeholder="Rappel..." value={newReminder.text} onChange={e => setNewReminder(r => ({ ...r, text:e.target.value }))}/>
            <input style={{ ...S.addInput, flex:1, maxWidth:"80px" }} placeholder="Heure" value={newReminder.time} onChange={e => setNewReminder(r => ({ ...r, time:e.target.value }))}/>
            <button style={{ background:"linear-gradient(135deg,#c0392b,#a93226)", border:"none", borderRadius:"10px", padding:"10px 16px", color:"white", fontWeight:"600", cursor:"pointer", fontSize:"18px" }} onClick={addReminder}>+</button>
          </div>
          <div style={S.card}>
            {reminders.length === 0 && <div style={{ color:"#5a5040", fontSize:"13px", textAlign:"center", padding:"20px 0" }}>Aucun rappel pour l'instant !</div>}
            {reminders.map((r, i) => (
              <div key={i} style={itemStyle}>
                <button style={{ width:"22px", height:"22px", borderRadius:"6px", border:"1px solid #2a2218", background:"none", cursor:"pointer", color:"#2ecc71", fontSize:"12px" }} onClick={() => toggleReminder(i)}>{r.done?"✅":"○"}</button>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"13px", color:r.done?"#5a5040":"#ede5d4", textDecoration:r.done?"line-through":"none" }}>{r.text}</div>
                  {r.time && <div style={{ fontSize:"10px", color:"#d4a017" }}>⏰ {r.time}</div>}
                </div>
                <button style={{ background:"none", border:"none", color:"#5a5040", cursor:"pointer", fontSize:"16px" }} onClick={() => deleteReminder(i)}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {activeTab === "memory" && (
        <div style={S.panel}>
          <div style={{ fontSize:"11px", fontWeight:"600", color:"#d4a017", textTransform:"uppercase", letterSpacing:"0.1em" }}>Mémoire personnelle</div>
          <div style={{ fontSize:"12px", color:"#7a6f5e", marginBottom:"10px" }}>Ce que Claude doit toujours savoir sur toi et tes projets.</div>
          <div style={S.addRow}>
            <input style={S.addInput} placeholder="Ajouter une info à retenir..." value={newMemory} onChange={e => setNewMemory(e.target.value)} onKeyDown={e => e.key==="Enter" && addMemory()}/>
            <button style={{ background:"linear-gradient(135deg,#c0392b,#a93226)", border:"none", borderRadius:"10px", padding:"10px 16px", color:"white", fontWeight:"600", cursor:"pointer", fontSize:"18px" }} onClick={addMemory}>+</button>
          </div>
          <div style={S.card}>
            {memory.length === 0 && <div style={{ color:"#5a5040", fontSize:"13px", textAlign:"center", padding:"20px 0" }}>Aucune info mémorisée encore bé !</div>}
            {memory.map((m, i) => (
              <div key={i} style={itemStyle}>
                <div style={{ flex:1, fontSize:"13px", color:"#ede5d4" }}>🧠 {m}</div>
                <button style={{ background:"none", border:"none", color:"#5a5040", cursor:"pointer", fontSize:"16px" }} onClick={() => deleteMemory(i)}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
